<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WordDrop — Link Expired</title>
  <link rel="stylesheet" href="src/styles/main.css" />
  <style>
    body {
      display:         flex;
      flex-direction:  column;
      align-items:     center;
      justify-content: center;
      min-height:      100dvh;
      padding:         32px 24px;
      text-align:      center;
      gap:             12px;
    }
    .icon  { font-size: 3rem; }
    h1     { font-size: 1.5rem; font-weight: 800; }
    p      { color: var(--text-muted); font-size: .95rem; max-width: 280px; line-height: 1.5; }
    .cta   {
      margin-top:    8px;
      padding:       14px 28px;
      background:    var(--accent);
      color:         #fff;
      border-radius: 12px;
      font-size:     1rem;
      font-weight:   600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="icon">⏰</div>
  <h1>This link has expired</h1>
  <p>Shared grids are only available for 3 hours. Start a fresh game below.</p>
  <a href="/" class="cta">Play a new game</a>
</body>
</html>
